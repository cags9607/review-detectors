type: task
name: combined-review-detectors

python: "3.11"

resources:
  gpu: 24GB

commands:
  - pip install -U pip
  - pip install -e .
  - python processor.py

env:
  - QUEUE_URL
  - QUEUE_API_KEY
  - QUEUE_KEY
  - BATCH_SIZE=8
  - REVIEW_DETECTORS_OUTPUT_FORMAT=long
  - SCAM_REVIEW_DETECTOR_NAME=scam
  - AI_REVIEW_DETECTOR_NAME=ai
  - EMPTY_QUEUE_SLEEP_SECONDS=60
  - HF_TOKEN
  - SCAM_REVIEW_HF_REPO_ID=DeepSee-io/app-high-risk-signals-classifiers
  - SCAM_REVIEW_SUBFOLDER=scam_reviews
  - SCAM_REVIEW_NO_4BIT=0
  - SCAM_REVIEW_APPLY_ONE_WORD_MAPPING=1
  - SCAM_REVIEW_FORCE_UNKNOWN_SINGLE_WORD_CLEAN=1
  - AI_REVIEW_HF_REPO_ID=DeepSee-io/qwen_adapters_aigt
  - AI_REVIEW_SUBDIR_BY_LANG_JSON={"en":"reviews/best"}
  - AI_REVIEW_DEVICE=cuda
  - AI_REVIEW_CACHE_POLICY=keep
  - AI_REVIEW_MIN_WORDS=10
